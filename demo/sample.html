<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sample page</title>
    <style>
        
        .container {width:100%; max-width: 1200px; margin: 0 auto; padding: 0 20px;}
        header {width: 100%; height: 100%; border-bottom: 1px solid #ccc; overflow: hidden; display: flex; justify-content: space-between; align-items: center;}            
        header > nav {margin: auto 0;}
        header > nav > ul {display: flex; gap: 10px; margin: 10px 0; align-items: center;}
        header > nav > ul > li > a {display:block; height:26px; border-radius: 80px; background: #F00062; color: #fff; padding: 0 10px; text-align: center; position: relative;}
        header > nav > ul > li > a::after {content:""; background: url(../src/img/bubble_arr2.png) no-repeat center / 100%; width: 12px; height: 6px; position: absolute; bottom: -5px; right: 10px;}
        header > nav > ul > li > a:hover {background: #1791FC;}
        header > nav > ul > li > a:hover::after {background-image: url(../src/img/bubble_arr.png);}
        
        footer {width: 100%; background: #000; color: #fff; height: 100px; padding: 120px 20px 0; font-size: 28px; display: flex; justify-content: flex-end; align-items: center; padding: 0 20px; margin-top: 120px;}
        footer .foot-wrap {display: flex; gap: 10px;}
        footer .foot-wrap li a {color: #fff; font-size: 18px; line-height: 1; font-weight: 400; }
    
        .mouse-box {margin-top: 24px;}
        .mouse-box p {margin-bottom: 12px;}
        .random-box {margin-top: 24px;}        
        .random-box p {margin-bottom: 12px;}

        .cont-intro {width: 100%; margin-bottom: 10px;}
        .cont-intro .title {font-size: 26px; font-weight: 700; line-height: 1.2;}
        .cont-intro .desc {font-size: 18px; font-weight: 500; line-height: 1;}
        .cont-intro img {width: 100%; height: 100%; object-fit: cover; margin-top: 20px;}
        .cont-wrap {display: flex; gap: 10px; justify-content: center; align-items: center;}
        .cont-box {width:100%; height: 250px; border-radius: 10px; color: #000; margin-bottom: 10px; display: flex; align-items: center; justify-content: center;}
        .cont-wrap .cont-box {width: calc(50% - 10px);}

        #randomAction .random-wrap {
            position: relative;
            height: min(56vw, 360px);
            min-height: 240px;
            border-radius: 16px;
            overflow: hidden;
            background: radial-gradient(circle at 20% 20%, #1f2937 0%, #111827 45%, #0a1222 100%);
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.08), 0 10px 24px rgba(0, 0, 0, 0.25);
        }
        #mouseAction .mouse-wrap {
            position: relative;
            height: min(44vw, 280px);
            min-height: 220px;
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(180deg, #f6f8ff 0%, #e8f2ff 100%);
            border: 1px solid #dbe7ff;
            box-shadow: inset 0 0 22px rgba(255, 255, 255, 0.85), 0 10px 24px rgba(27, 60, 112, 0.12);
        }

        .random-bubble {
            position: absolute;
            left: 0;
            top: 0;
            border-radius: 999px;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .pointer-bubble {
            position: absolute;
            left: 0;
            top: 0;
            z-index: 20;
            pointer-events: none;
            width: max-content;
            height: 43px;
            padding: 0 16px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 14px 24px rgba(0, 0, 0, 0.24); 
            background: #5db3ff;                        
            opacity: 0;
            transform: translate(-9999px, -9999px);
            transition: opacity 0.24s ease;
        }
        .pointer-bubble::after {
            content: "";
            position: absolute;
            left: 14px;
            bottom: -8px;
            width: 14px;
            height: 10px;
            background: #5db3ff;
            clip-path: polygon(35% 0, 100% 0, 50% 100%);
            transform: rotate(15deg);
        }

        .pointer-bubble.on {
            opacity: 1;
        }

        .pointer-bubble span {
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
    </style>
    <script>
      // 로컬/배포 환경 모두 대응: 첫 경로 실패 시 다음 경로로 자동 폴백
      window.__loadWithFallback = function (type, paths) {
        return new Promise((resolve, reject) => {
          let index = 0;
          const tryLoad = () => {
            if (index >= paths.length) {
              reject(new Error(type + " resource load failed"));
              return;
            }

            const path = paths[index++];
            if (type === "css") {
              const link = document.createElement("link");
              link.rel = "stylesheet";
              link.href = path;
              link.onload = () => resolve(path);
              link.onerror = tryLoad;
              document.head.appendChild(link);
              return;
            }

            const script = document.createElement("script");
            script.src = path;
            script.onload = () => resolve(path);
            script.onerror = tryLoad;
            document.head.appendChild(script);
          };

          tryLoad();
        });
      };
    </script>
    <script>
      window.__scrollAssetsReady = Promise.all([
        window.__loadWithFallback("css", ["../src/scroll-events.css"]),
        window.__loadWithFallback("js", ["../src/scroll-events.js"]),
      ]);
    </script>
</head>
<body>
    
    <div class="container">
        <header>
            <div class="bubble"><a href="./index.html">home</a></div>
            <nav>
                <ul>
                    <li><a href="#">menu1</a></li>
                    <li><a href="#">menu2</a></li>
                    <li><a href="#">menu3</a></li>
                </ul>
            </nav>
        </header>
        <section>
            <div class="cont-intro">
                <h3 class="title">샘플 테스트 페이지입니다.</h3>
                <p class="desc">더 많은정보를 보려면 아래로 스크롤해주세요.</p>
                
                <section class="mouse-box" id="mouseAction">
                    <div class="card" data-scroll-effect="pop" data-scroll-duration="720">
                        <h2>mouseAction</h2>
                        <p>mouse-wrap 내부에서 마우스를 따라다니는 말풍선</p>
                        <div class="mouse-wrap"></div>
                    </div>
                </section>


                <section class="random-box" id="randomAction">
                    <div class="card" data-scroll-effect="pop" data-scroll-duration="900">
                    <h2>randomAction</h2>
                    <p>random-wrap 내부에서 버블이 자유롭게 튕기는 인터랙션</p>
                    <div class="random-wrap"></div>                    
                    </div>
                </section>
                
            </div>
            <div class="cont-box card" data-scroll="glass-rise">glass-rise</div>
            <div class="cont-wrap">                
                <div class="cont-box card" data-scroll="slide-left">slide-left</div>
                <div class="cont-box card" data-scroll="slide-right">slide-right</div>
            </div>
        </section>        
    </div>
    <footer>        
        <ul class="foot-wrap">
            <li><a href="#">footer1</a></li>
            <li><a href="#">footer2</a></li>
            <li><a href="#">footer3</a></li>
        </ul>
    </footer>
    <script>
        window.__scrollAssetsReady.then(() => {
          const scroll = window.ScrollEvents.create({
            once: false,
            resetOnLeave: "both",
            threshold: 0.12,
          });

          scroll.init();

          const randomSection = document.getElementById("randomAction");
          if (randomSection) {
            const randomWrap = randomSection.querySelector(".random-wrap");
            initRandomBubbles(randomWrap, 14);
          }

          const mouseSection = document.getElementById("mouseAction");
          if (mouseSection) {
            const mouseWrap = mouseSection.querySelector(".mouse-wrap");
            initPointerBubble(mouseWrap);
          }

        }).catch((error) => {
          // eslint-disable-next-line no-console
          console.error("[ScrollEvents] 리소스 로드 실패:", error);
        });

        // random-wrap 내부 버블 튕김 인터랙션
        function initRandomBubbles(container, count) {
            if (!container) return;

            const bubbles = [];
            let rafId = null;
            let prevTs = 0;
            let cw = 0;
            let ch = 0;

            const random = (min, max) => Math.random() * (max - min) + min;

            const palette = [
            "rgb(255, 120, 0)",
            "rgb(255, 160, 214)",
            "rgb(255, 214, 122)",
            "rgb(138, 255, 198)",
            "rgb(167, 154, 255)",
            ];

            function setupBounds() {
            const rect = container.getBoundingClientRect();
            cw = rect.width;
            ch = rect.height;
            }

            function makeBubble(index) {
            const size = random(24, 72);
            const el = document.createElement("span");
            el.className = "random-bubble";
            el.style.width = `${size}px`;
            el.style.height = `${size}px`;
            el.style.background = `radial-gradient(circle at 35% 35%, rgba(255,255,255,0.9), ${palette[index % palette.length]} 72%)`;
            el.style.opacity = String(random(0.55, 0.9));
            container.appendChild(el);

            return {
                el,
                r: size / 2,
                x: random(size / 2, Math.max(size / 2, cw - size / 2)),
                y: random(size / 2, Math.max(size / 2, ch - size / 2)),
                vx: random(-120, 120) || 90,
                vy: random(-120, 120) || -90,
            };
            }

            function clampInside(b) {
            b.x = Math.max(b.r, Math.min(cw - b.r, b.x));
            b.y = Math.max(b.r, Math.min(ch - b.r, b.y));
            }

            function onResize() {
            setupBounds();
            bubbles.forEach(clampInside);
            }

            function draw(b) {
            b.el.style.transform = `translate(${b.x - b.r}px, ${b.y - b.r}px)`;
            }

            function tick(ts) {
            if (!prevTs) prevTs = ts;
            const dt = Math.min((ts - prevTs) / 1000, 0.032);
            prevTs = ts;

            bubbles.forEach((b) => {
                b.x += b.vx * dt;
                b.y += b.vy * dt;

                if (b.x - b.r <= 0) {
                b.x = b.r;
                b.vx *= -1;
                } else if (b.x + b.r >= cw) {
                b.x = cw - b.r;
                b.vx *= -1;
                }

                if (b.y - b.r <= 0) {
                b.y = b.r;
                b.vy *= -1;
                } else if (b.y + b.r >= ch) {
                b.y = ch - b.r;
                b.vy *= -1;
                }

                draw(b);
            });

            rafId = requestAnimationFrame(tick);
            }

            setupBounds();

            for (let i = 0; i < count; i += 1) {
            bubbles.push(makeBubble(i));
            }

            bubbles.forEach(draw);
            rafId = requestAnimationFrame(tick);
            window.addEventListener("resize", onResize);

            // 필요 시 외부에서 정리 가능하도록 핸들 노출
            container.__randomBubbleController = {
            destroy() {
                if (rafId) cancelAnimationFrame(rafId);
                window.removeEventListener("resize", onResize);
                container.innerHTML = "";
            },
            };
        }

        // mouse-wrap 내부에서 마우스를 따라다니는 말풍선 + 공 반응 모션
        function initPointerBubble(container) {
            if (!container) return;

            const bubble = document.createElement("div");
            bubble.className = "pointer-bubble";
            bubble.innerHTML = '<span>Catch me If you can!</span>';
            container.appendChild(bubble);
            

            let cw = 0;
            let ch = 0;
            let tx = 0;
            let ty = 0;
            let x = 0;
            let y = 0;
            let mvx = 0;
            let mvy = 0;
            let bvx = 0;
            let bvy = 0;
            let entered = false;
            let rafId = null;

            const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

            function measure() {
                const rect = container.getBoundingClientRect();
                cw = rect.width;
                ch = rect.height;
            }

            function placeAtCenter() {
                const bw = bubble.offsetWidth || 128;
                const bh = bubble.offsetHeight || 56;
                tx = (cw - bw) / 2;
                ty = (ch - bh) / 2;
                x = tx;
                y = ty;
            }

            function onPointerEnter(e) {
                measure();
                const rect = container.getBoundingClientRect();
                const px = e.clientX - rect.left;
                const py = e.clientY - rect.top;
                const bw = bubble.offsetWidth || 128;
                const bh = bubble.offsetHeight || 56;

                tx = clamp(px + 14, 0, Math.max(0, cw - bw));
                ty = clamp(py - bh - 10, 0, Math.max(0, ch - bh));
                x = tx;
                y = ty;
                entered = true;
                bubble.classList.add("on");
            }

            function onPointerMove(e) {
                if (!entered) return;

                const rect = container.getBoundingClientRect();
                const px = e.clientX - rect.left;
                const py = e.clientY - rect.top;
                const bw = bubble.offsetWidth || 128;
                const bh = bubble.offsetHeight || 56;

                const nextTx = clamp(px + 14, 0, Math.max(0, cw - bw));
                const nextTy = clamp(py - bh - 10, 0, Math.max(0, ch - bh));

                mvx += nextTx - tx;
                mvy += nextTy - ty;
                tx = nextTx;
                ty = nextTy;
            }

            function onPointerLeave() {
                entered = false;
                bubble.classList.remove("on");
            }

            function onResize() {
                measure();
                placeAtCenter();
            }

            function tick() {
                // 말풍선은 타겟 좌표를 부드럽게 따라감
                x += (tx - x) * 0.2;
                y += (ty - y) * 0.2;
                bubble.style.transform = `translate3d(${x}px, ${y}px, 0)`;

    
                rafId = requestAnimationFrame(tick);
            }

            measure();
            placeAtCenter();
            bubble.style.transform = `translate3d(${x}px, ${y}px, 0)`;

            container.addEventListener("pointerenter", onPointerEnter);
            container.addEventListener("pointermove", onPointerMove);
            container.addEventListener("pointerleave", onPointerLeave);
            window.addEventListener("resize", onResize);
            rafId = requestAnimationFrame(tick);

            container.__pointerBubbleController = {
                destroy() {
                    if (rafId) cancelAnimationFrame(rafId);
                    container.removeEventListener("pointerenter", onPointerEnter);
                    container.removeEventListener("pointermove", onPointerMove);
                    container.removeEventListener("pointerleave", onPointerLeave);
                    window.removeEventListener("resize", onResize);
                    bubble.remove();
                },
            };
        }
    </script>
</body>
</html>
